      color: #000A1F;

      font-size: 16px;

    .login-box button {

      width: 100%;

      padding: 10px;

      margin-top: 2px;

      border: none;

      border-radius: 8px;

      font-size: 20px;

      font-weight: bold;

      color: white;

      background: #000A1F;

      cursor: pointer;

      transition: 0.3s;

      text-transform: uppercase;

    }

    .login-box button:hover {

      background: #000A1F;

      box-shadow: 0 0 10px cyan;

    }

    .login-box a {

      display: block;

      margin-top: 15px;

      font-size: 16px;

      color: #000A1F;

      text-decoration: underline;

      transition: 0.3s;

    }

    .login-box a:hover {

      text-shadow: 0 0 8px cyan;

    }
