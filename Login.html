<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <style>

    body {

      margin: 0;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      background: #000A1F;

      font-family: 'Fira-code', monospace;

      overflow: hidden;

    }
    
    /* Background layers */

    #matrix, #particles-js {

      position: absolute;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      z-index: -2;

    }

    #particles-js {

      z-index: -1;

    }

    .login-box {

      width: 350px;

      padding: 40px;


      border: 1px solid white;

      border-radius: 10px;

      box-shadow: 0 0 5px ;

      text-align: center;

      color: white ;

      z-index: 1;

    }

    .login-box h2 {

      margin-bottom: 20px;

      text-shadow: 0 0 5px;
    }

    .login-box input {

      width: 100%;

      padding: 12px;

      margin: 10px 0;

      border: none;

      border-radius: 6px;

      background: #000A1F;

      color: white;

      font-size: 16px;

      outline: none;

      box-shadow: inset 0 0 5px white;

    }

    .login-box button {

      width: 100%;

      padding: 10px;

      margin-top: 2px;

      border: none;

      border-radius: 8px;

      font-size: 20px;

      font-weight: bold;

      color: #000A1F;

      background: white;

      cursor: pointer;

      transition: 0.3s;

      text-transform: uppercase;

    }

    .login-box button:hover {

      background: white;

      box-shadow: 0 0 10px cyan;

    }

    .login-box a {

      display: block;

      margin-top: 15px;

      font-size: 16px;

      color: white;

      text-decoration: underline;

      transition: 0.3s;

    }

    .login-box a:hover {

      text-shadow: 0 0 8px cyan;

    }

  </style>

</head>

<body>

  <!-- Matrix Effect -->

  <canvas id="matrix"></canvas>

  <!-- Particles Background -->

  <div id="particles-js"></div>

  <!-- Login Form -->

  <div class="login-box">

    <h2>Sign In</h2>

    <form>

      <input type="text" placeholder="Username" required>

      <input type="password" placeholder="Password" required>

     <a href="index.html"><button type="submit">Login</button></a>

<p>
New here ?
      <a href="Create.html">Create an account</a>
</p>

    </form>

  </div>
  
</body>

</html>
